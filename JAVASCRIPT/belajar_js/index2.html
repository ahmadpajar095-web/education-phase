<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<style>
    header {
        background-color: antiquewhite;
        padding: 20px 20px;
        display: flex;
        justify-content: space-between;
    }
    .brand {
        display: flex;
        align-items: center;
        justify-content: center;
        font-size: 28px;
        font-weight: 700;
    }
    .nav {
        display: flex;
        justify-content: center;
        gap: 15px;
        align-items: center;
    }
    .nav div {
        font-size: 20px;
        padding: 3px 3px;
        border-radius: 5px;
        transition: 0.29s;
    }

    .nav div:hover {
        text-decoration: underline;
        transform: translatey(-5px);
    }
    .link {
        transition: 0.2s;
    }
</style>
<body>
    <script src="main2.js"></script>
    <header>
        <div class="brand">A.pajar</div>
        <div class="nav">
            <div class="link" onclick="gantiwarna(this)"> home</div>
            <div class="link" onclick="gantiwarna(this)">content</div>
            <div class="link" id="konto" onclick="gantiwarna(this)">contact</div>
        </div>
    </header>
    
</body>
</html>
